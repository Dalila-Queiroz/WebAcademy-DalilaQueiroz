name: Quarto Workflow

on:
  push:
  workflow_dispatch:

jobs:
  validar-arquivos:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Verificar README
        run: test -f README.md

      - name: Verificar LICENSE
        run: test -f LICENSE

      - name: Verificar .gitignore
        run: test -f .gitignore

      - name: Mensagem final
        run: echo "Todos os arquivos obrigatórios existem."
