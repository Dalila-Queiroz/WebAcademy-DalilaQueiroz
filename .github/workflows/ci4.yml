name: Quarto Workflow

on:
  push:
  workflow_dispatch:

jobs:
  validar-repositorio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v5

      - name: Verificar arquivos obrigatórios
        run: |
          test -f README.md
          test -f LICENSE
          test -f .gitignore

          echo "Todos os arquivos obrigatórios existem."


